
services:
  # Backend API Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: imagenvisualizador-server
    restart: unless-stopped
    volumes:
      # Mount your images directory (read-only for security)
      - ${IMAGES_DIR}:/data:ro
    env_file:
      - .env
    environment:
      - IMAGES_DIR=/data
      - PORT=3001
      - HOST=0.0.0.0
      - NODE_ENV=production
    networks:
      - imagenvisualizador-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # Frontend Client (Nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: imagenvisualizador-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - imagenvisualizador-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  imagenvisualizador-network:
    driver: bridge
